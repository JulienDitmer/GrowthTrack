      };

      const checkCustomBadge = (b) => {
        const statMap = { streak: stats.currentStreak, workouts: stats.totalWorkouts, foodLogs: stats.totalFoodLogs, perfectDays: stats.perfectDays };
        return (statMap[b.type] || 0) >= b.target;
      };

      return (
        <div className="container">
          <div className="section-header" style={{ marginBottom: 10 }}>Standaard badges</div>
          <div className="grid-4" style={{ marginBottom: 20 }}>
            {BADGES.map(badge => {
              const isEarned = !!earned.find(b => b.id === badge.id);
              return (
                <div key={badge.id} className={`badge-item ${isEarned ? '' : 'locked'}`} title={badge.desc}>
                  <div className="badge-emoji">{badge.emoji}</div>
                  <div className="badge-label">{badge.label}</div>
                </div>
              );
            })}
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div className="section-header" style={{ margin: 0 }}>Eigen badges</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setShowAddBadge(!showAddBadge)}>
              {showAddBadge ? '✕' : '+ Toevoegen'}
            </button>
          </div>

          {showAddBadge && (
            <div style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 12, padding: 14, marginBottom: 14 }}>
              <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                <input value={newBadge.emoji} onChange={e => setNewBadge({ ...newBadge, emoji: e.target.value })} style={{ width: 52 }} placeholder="🏅" />
                <input value={newBadge.label} onChange={e => setNewBadge({ ...newBadge, label: e.target.value })} placeholder="Naam van badge" style={{ flex: 1 }} />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 12 }}>
                <div className="field">
                  <label>Type</label>
                  <select value={newBadge.type} onChange={e => setNewBadge({ ...newBadge, type: e.target.value })}>
                    {BADGE_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                  </select>
                </div>
                <div className="field">
                  <label>Target getal</label>
                  <input type="number" value={newBadge.target} min="1" onChange={e => setNewBadge({ ...newBadge, target: e.target.value })} />
                </div>
              </div>
              <button className="btn btn-primary" style={{ width: '100%' }} onClick={saveCustomBadge}>Badge opslaan</button>
            </div>
          )}

          {customBadges.length === 0 && !showAddBadge ? (
            <div style={{ textAlign: 'center', color: 'var(--muted)', fontSize: 13, padding: '12px 0' }}>
              Maak je eigen mijlpaal-badges
            </div>
          ) : (
            <div className="grid-4">
              {customBadges.map(b => {
                const isEarned = checkCustomBadge(b);
                const statMap = { streak: stats.currentStreak, workouts: stats.totalWorkouts, foodLogs: stats.totalFoodLogs, perfectDays: stats.perfectDays };
                const current = statMap[b.type] || 0;
                return (
                  <div key={b.id} className={`badge-item ${isEarned ? '' : 'locked'}`} style={{ position: 'relative' }}
                    title={`${current} / ${b.target}`}>
                    <button onClick={() => deleteCustomBadge(b.id)} style={{ position: 'absolute', top: 2, right: 2, background: 'none', border: 'none', color: 'var(--red)', fontSize: 10, cursor: 'pointer' }}>✕</button>
                    <div className="badge-emoji">{b.emoji}</div>
                    <div className="badge-label">{b.label}</div>
                    <div style={{ fontSize: 9, color: 'var(--muted)', marginTop: 2 }}>{current}/{b.target}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function GewichtTab({ user, profile, setProfile, weightLogs, setWeightLogs }) {
      const bs = profile?.bodyStats || {};
      const [heightCm, setHeightCm] = useState(bs.height || '');
      const [age, setAge] = useState(bs.age || '');
      const [targetKg, setTargetKg] = useState(bs.targetWeight || '');
      const [newWeight, setNewWeight] = useState('');
      const [statsOpen, setStatsOpen] = useState(false);

      const saveBodyStats = (h, a, t) => {
        const updated = { ...profile, bodyStats: { height: h, age: a, targetWeight: t } };
        setProfile(updated);
        localStorage.setItem(`gt_profile_${user.uid}`, JSON.stringify(updated));
      };

      const addWeight = () => {
        const w = parseFloat(newWeight);
        if (!w || w < 20 || w > 300) return;
        const log = { date: today(), weight: w };
        const filtered = weightLogs.filter(l => l.date !== today());
        const logs = [...filtered, log].sort((a, b) => a.date.localeCompare(b.date));
        setWeightLogs(logs);
        localStorage.setItem(`gt_weight_${user.uid}`, JSON.stringify(logs));
        setNewWeight('');
      };

      const currentWeight = weightLogs.length ? weightLogs[weightLogs.length - 1].weight : null;
      const bmi     = calcBMI(currentWeight, +heightCm);
      const cat     = bmiCategory(bmi);
      const avgW    = calcAvgWeight(+heightCm, +age);
      const tgtW    = targetKg ? parseFloat(targetKg) : null;
      const diffTarget = (currentWeight && tgtW) ? Math.round((currentWeight - tgtW) * 10) / 10 : null;
      const diffAvg    = (currentWeight && avgW)  ? Math.round((currentWeight - avgW)  * 10) / 10 : null;

      return (
        <div className="container">
          <div className="card" style={{ marginBottom: 14 }}>
            <div className="section-header" style={{ marginBottom: 10 }}>📏 Jouw gegevens</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 10 }}>
              <div className="field">
                <label>Lengte (cm)</label>
                <input type="number" value={heightCm} min="100" max="250" placeholder="180"
                  onChange={e => { setHeightCm(e.target.value); saveBodyStats(e.target.value, age, targetKg); }} />
              </div>
              <div className="field">
                <label>Leeftijd</label>
                <input type="number" value={age} min="10" max="120" placeholder="25"
                  onChange={e => { setAge(e.target.value); saveBodyStats(heightCm, e.target.value, targetKg); }} />
              </div>
              <div className="field">
                <label>Streefgewicht</label>
                <input type="number" value={targetKg} min="30" max="250" step="0.5" placeholder="75"
                  onChange={e => { setTargetKg(e.target.value); saveBodyStats(heightCm, age, e.target.value); }} />
              </div>
            </div>
          </div>

          {bmi !== null && (
            <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
              <div style={{
                width: 76, height: 76, borderRadius: '50%', flexShrink: 0,
                border: `4px solid ${cat.color}`,
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                background: cat.color + '15'
              }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: cat.color, lineHeight: 1 }}>{bmi}</div>
                <div style={{ fontSize: 8.5, color: cat.color, textAlign: 'center', lineHeight: 1.1, marginTop: 2 }}>BMI</div>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: cat.color, marginBottom: 4 }}>{cat.label}</div>
                {avgW && (
                  <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 2 }}>
                    <span style={{ color: '#60a5fa' }}>◉</span> Gemiddeld voor jouw lengte/leeftijd: <strong style={{ color: 'var(--text)' }}>{avgW} kg</strong>
                    {diffAvg !== null && (
                      <span style={{ color: diffAvg > 0 ? 'var(--yellow)' : 'var(--green)', marginLeft: 6 }}>
                        ({diffAvg > 0 ? '+' : ''}{diffAvg} kg)
                      </span>
                    )}
                  </div>
                )}
                {tgtW && (
                  <div style={{ fontSize: 12, color: 'var(--muted)' }}>
                    <span style={{ color: '#34d399' }}>◉</span> Streefgewicht: <strong style={{ color: 'var(--text)' }}>{tgtW} kg</strong>
                    {diffTarget !== null && (
                      <span style={{ color: diffTarget > 0 ? 'var(--yellow)' : 'var(--green)', marginLeft: 6 }}>
                        ({diffTarget > 0 ? '+' : ''}{diffTarget} kg te gaan)
                      </span>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}

          {bmi !== null && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ position: 'relative', height: 8, borderRadius: 4, background: 'linear-gradient(to right, #60a5fa 0%, #34d399 30%, #fbbf24 60%, #f87171 100%)', marginBottom: 4 }}>
                <div style={{
                  position: 'absolute', top: -3,
                  left: `${Math.min(Math.max((bmi - 16) / (35 - 16), 0), 1) * 100}%`,
                  transform: 'translateX(-50%)',
                  width: 14, height: 14, borderRadius: '50%',
                  background: cat.color, border: '2px solid #0f0f13'
                }} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: 'var(--muted)', paddingTop: 2 }}>
                <span>16 – Ondergewicht</span>
                <span>18.5</span>
                <span>25</span>
                <span>30 – Obesitas</span>
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
            <input type="number" value={newWeight} onChange={e => setNewWeight(e.target.value)}
              placeholder="Huidig gewicht (kg)" step="0.1" min="20" max="300"
              style={{ flex: 1 }} onKeyDown={e => e.key === 'Enter' && addWeight()} />
            <button className="btn btn-primary" onClick={addWeight} style={{ flexShrink: 0 }}>
              + Loggen
            </button>
          </div>

          {weightLogs.length > 0 ? (
            <div className="card" style={{ padding: '14px 10px 8px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, paddingInline: 4 }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>Gewichtsverloop</div>
                <button style={{ background: 'none', border: 'none', fontSize: 12, color: 'var(--muted)', cursor: 'pointer' }}
                  onClick={() => setStatsOpen(!statsOpen)}>
                  {statsOpen ? '▲' : '▼'} details
                </button>
              </div>
              <WeightChart data={weightLogs.slice(-30)} avgWeight={avgW} targetWeight={tgtW} />
              <div style={{ display: 'flex', gap: 14, fontSize: 11, color: 'var(--muted)', marginTop: 8, paddingInline: 4, flexWrap: 'wrap' }}>
                <span><span style={{ color: '#7c6dfa' }}>━</span> Jouw gewicht</span>
                {avgW  && <span><span style={{ color: '#60a5fa' }}>╌</span> Gemiddeld ({avgW} kg)</span>}
                {tgtW  && <span><span style={{ color: '#34d399' }}>╌</span> Streef ({tgtW} kg)</span>}
              </div>
              {statsOpen && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginTop: 12 }}>
                  {[
                    { label: 'Huidig', val: `${currentWeight} kg` },
                    { label: 'Laagste', val: `${Math.min(...weightLogs.map(l => l.weight))} kg` },
                    { label: 'Hoogste', val: `${Math.max(...weightLogs.map(l => l.weight))} kg` },
                  ].map(s => (
                    <div key={s.label} style={{ background: 'var(--surface2)', borderRadius: 8, padding: '8px 6px', textAlign: 'center' }}>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{s.val}</div>
                      <div style={{ fontSize: 10, color: 'var(--muted)' }}>{s.label}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ) : (
            <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '24px 0' }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>⚖️</div>
              Log je eerste gewicht hierboven om de grafiek te zien
            </div>
          )}
        </div>
      );
    }

    function SupplementenTab({ user, profile, setProfile, supplements, setSupplements }) {
      const [showAddSupp, setShowAddSupp] = useState(false);
      const [newSuppName, setNewSuppName] = useState('');
      const [newSuppDose, setNewSuppDose] = useState('');

      const saveSupplements = (updated) => {
        setSupplements(updated);
        const p = { ...profile, supplements: updated };
        setProfile(p);
        localStorage.setItem(`gt_profile_${user.uid}`, JSON.stringify(p));
      };

      const addSupp = () => {
        if (!newSuppName.trim()) return;
        const s = { id: Date.now().toString(), name: newSuppName, dose: newSuppDose };
        saveSupplements([...supplements, s]);
        setNewSuppName(''); setNewSuppDose(''); setShowAddSupp(false);
      };

      return (
        <div className="container">
          <button className="btn btn-primary" style={{ width: '100%', marginBottom: 14 }}
            onClick={() => setShowAddSupp(!showAddSupp)}>
            {showAddSupp ? '✕ Annuleren' : '+ Supplement toevoegen'}
          </button>

          {showAddSupp && (
            <div style={{ background: 'var(--surface2)', borderRadius: 12, padding: 14, marginBottom: 14, border: '1px solid var(--border)' }}>
              <div className="field" style={{ marginBottom: 8 }}>
                <label>Naam supplement</label>
                <input value={newSuppName} onChange={e => setNewSuppName(e.target.value)} placeholder="bv. Vitamine D" />
              </div>
              <div className="field" style={{ marginBottom: 12 }}>
                <label>Dosering (optioneel)</label>
                <input value={newSuppDose} onChange={e => setNewSuppDose(e.target.value)} placeholder="bv. 1000 IU / 5g" />
              </div>
              <button className="btn btn-primary" style={{ width: '100%' }} onClick={addSupp}>Opslaan</button>
            </div>
          )}

          {supplements.length === 0 && !showAddSupp && (
            <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '24px 0' }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>💊</div>
              Nog geen supplementen. Voeg je eerste supplement toe!
            </div>
          )}

          {supplements.map((supp) => (
            <div key={supp.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '12px 14px', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ fontSize: 22 }}>💊</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600 }}>{supp.name}</div>
                {supp.dose && <div style={{ fontSize: 12, color: 'var(--muted)' }}>{supp.dose}</div>}
              </div>
              <button onClick={() => saveSupplements(supplements.filter(s => s.id !== supp.id))}
                style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: 18 }}>✕</button>
            </div>
          ))}
        </div>
      );
    }

    function DoelenTab({ user, profile, setProfile, goals, setGoals }) {
      const [goalTab, setGoalTab] = useState('dagelijks');
      const [showAddGoal, setShowAddGoal] = useState(false);
      const [newGoal, setNewGoal] = useState({ name: '', emoji: '🎯', trackDaily: true, isMonthly: false, target: '', unit: '' });

      const thisMonth = new Date().toISOString().slice(0, 7);
      const [monthlyProgress, setMonthlyProgress] = useState(
        JSON.parse(localStorage.getItem(`gt_monthly_${user.uid}_${thisMonth}`) || '{}')
      );

      const saveGoals = (updated) => {
        setGoals(updated);
        const p = { ...profile, goals: updated };
        setProfile(p);
        localStorage.setItem(`gt_profile_${user.uid}`, JSON.stringify(p));
      };

      const addGoal = () => {
        if (!newGoal.name.trim()) return;
        const g = { ...newGoal, id: Date.now().toString(), target: +newGoal.target || 0 };
        saveGoals([...goals, g]);
        setNewGoal({ name: '', emoji: '🎯', trackDaily: true, isMonthly: false, target: '', unit: '' });
        setShowAddGoal(false);
      };

      const deleteGoal = (id) => saveGoals(goals.filter(g => g.id !== id));
      const toggleGoalProp = (id, prop) => saveGoals(goals.map(g => g.id === id ? { ...g, [prop]: !g[prop] } : g));

      const logMonthlyProgress = (goalId, amount) => {
        const updated = { ...monthlyProgress, [goalId]: (monthlyProgress[goalId] || 0) + amount };
        localStorage.setItem(`gt_monthly_${user.uid}_${thisMonth}`, JSON.stringify(updated));
        setMonthlyProgress(updated);
      };

      const dailyGoals = goals.filter(g => g.trackDaily);
      const monthlyGoals = goals.filter(g => g.isMonthly);

      return (
        <div className="container">
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {[['dagelijks', '☀️ Dagelijks'], ['maandelijks', '📅 Maandelijks'], ['alle', '📋 Alle']].map(([v, l]) => (
              <button key={v} onClick={() => setGoalTab(v)}
                style={{ flex: 1, padding: '8px 4px', borderRadius: 8, border: `1px solid ${goalTab === v ? 'var(--accent)' : 'var(--border)'}`,
                  background: goalTab === v ? 'var(--accent)' : 'transparent', color: goalTab === v ? '#fff' : 'var(--muted)',
                  fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
                {l}
              </button>
            ))}
          </div>

          <button className="btn btn-primary" style={{ width: '100%', marginBottom: 14 }}
            onClick={() => setShowAddGoal(!showAddGoal)}>
            {showAddGoal ? '✕ Annuleren' : '+ Doel toevoegen'}
          </button>

          {showAddGoal && (
            <div style={{ background: 'var(--surface2)', borderRadius: 12, padding: 14, marginBottom: 14, border: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                <input value={newGoal.emoji} onChange={e => setNewGoal({ ...newGoal, emoji: e.target.value })}
                  style={{ width: 52 }} placeholder="🎯" />
                <input value={newGoal.name} onChange={e => setNewGoal({ ...newGoal, name: e.target.value })}
                  placeholder="Naam van het doel" style={{ flex: 1 }} />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 10 }}>
                <div className="field">
                  <label>Target (optioneel)</label>
                  <input type="number" value={newGoal.target} placeholder="bijv. 20"
                    onChange={e => setNewGoal({ ...newGoal, target: e.target.value })} />
                </div>
                <div className="field">
                  <label>Eenheid</label>
                  <input value={newGoal.unit} placeholder="keer / km / min"
                    onChange={e => setNewGoal({ ...newGoal, unit: e.target.value })} />
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
                <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, cursor: 'pointer', color: 'var(--text)', textTransform: 'none', fontWeight: 'normal', letterSpacing: 0 }}>
                  <input type="checkbox" checked={newGoal.trackDaily} onChange={e => setNewGoal({ ...newGoal, trackDaily: e.target.checked })} />
                  Dagelijks bijhouden
                </label>
                <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, cursor: 'pointer', color: 'var(--text)', textTransform: 'none', fontWeight: 'normal', letterSpacing: 0 }}>
                  <input type="checkbox" checked={newGoal.isMonthly} onChange={e => setNewGoal({ ...newGoal, isMonthly: e.target.checked })} />
                  Maandelijks doel
                </label>
              </div>
              <button className="btn btn-primary" style={{ width: '100%' }} onClick={addGoal}>Opslaan</button>
            </div>
          )}

          {goalTab === 'dagelijks' && (
            <div>
              {dailyGoals.length === 0
                ? <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '20px 0' }}>Geen dagelijkse doelen. Voeg een doel toe en zet "Dagelijks bijhouden" aan.</div>
                : dailyGoals.map(g => (
                  <div key={g.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '12px 14px', marginBottom: 8, display: 'flex', gap: 10, alignItems: 'center' }}>
                    <div style={{ fontSize: 22 }}>{g.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600 }}>{g.name}</div>
                      {g.target > 0 && <div style={{ fontSize: 12, color: 'var(--muted)' }}>Doel: {g.target} {g.unit}</div>}
                    </div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button onClick={() => toggleGoalProp(g.id, 'trackDaily')}
                        style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 8px', fontSize: 11, color: 'var(--accent2)', cursor: 'pointer' }}>☀️</button>
                      <button onClick={() => deleteGoal(g.id)}
                        style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: 16 }}>✕</button>
                    </div>
                  </div>
                ))
              }
            </div>
          )}

          {goalTab === 'maandelijks' && (
            <div>
              {monthlyGoals.length === 0
                ? <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '20px 0' }}>Geen maandelijkse doelen. Voeg een doel toe en zet "Maandelijks doel" aan.</div>
                : monthlyGoals.map(g => {
                  const done = monthlyProgress[g.id] || 0;
                  const pct = g.target > 0 ? Math.min((done / g.target) * 100, 100) : 0;
                  return (
                    <div key={g.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '14px', marginBottom: 10 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                        <div style={{ fontSize: 22 }}>{g.emoji}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600 }}>{g.name}</div>
                          <div style={{ fontSize: 12, color: 'var(--muted)' }}>{done} / {g.target} {g.unit} — {Math.round(pct)}%</div>
                        </div>
                        {pct >= 100 && <div style={{ fontSize: 20 }}>🏆</div>}
                        <button onClick={() => deleteGoal(g.id)} style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: 16 }}>✕</button>
                      </div>
                      <div style={{ background: 'var(--surface2)', borderRadius: 4, height: 8, marginBottom: 10, overflow: 'hidden' }}>
                        <div style={{ height: '100%', borderRadius: 4, width: pct + '%', background: pct >= 100 ? 'var(--green)' : 'var(--accent)', transition: 'width 0.3s' }} />
                      </div>
                      <div style={{ display: 'flex', gap: 6 }}>
                        {[1, 5, 10].map(n => (
                          <button key={n} onClick={() => logMonthlyProgress(g.id, n)}
                            style={{ flex: 1, padding: '6px', borderRadius: 8, border: '1px solid var(--border)', background: 'var(--surface2)', color: 'var(--text)', fontSize: 12, cursor: 'pointer', fontFamily: 'inherit' }}>
                            +{n} {g.unit}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })
              }
            </div>
          )}

          {goalTab === 'alle' && (
            <div>
              {goals.length === 0
                ? <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '20px 0' }}>Nog geen doelen. Voeg je eerste doel toe!</div>
                : goals.map(g => (
                  <div key={g.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '12px 14px', marginBottom: 8, display: 'flex', gap: 10, alignItems: 'center' }}>
                    <div style={{ fontSize: 22 }}>{g.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600 }}>{g.name}</div>
                      <div style={{ display: 'flex', gap: 6, marginTop: 4 }}>
                        {g.trackDaily && <span style={{ fontSize: 10, background: 'var(--accent)18', color: 'var(--accent2)', borderRadius: 10, padding: '1px 7px', border: '1px solid var(--accent)30' }}>Dagelijks</span>}
                        {g.isMonthly && <span style={{ fontSize: 10, background: '#fbbf2418', color: 'var(--yellow)', borderRadius: 10, padding: '1px 7px', border: '1px solid #fbbf2430' }}>Maandelijks</span>}
                        {g.target > 0 && <span style={{ fontSize: 10, color: 'var(--muted)' }}>Doel: {g.target} {g.unit}</span>}
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button onClick={() => toggleGoalProp(g.id, 'trackDaily')}
                        title="Toggle dagelijks" style={{ background: g.trackDaily ? 'var(--accent)22' : 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 7px', fontSize: 11, cursor: 'pointer' }}>☀️</button>
                      <button onClick={() => toggleGoalProp(g.id, 'isMonthly')}
                        title="Toggle maandelijks" style={{ background: g.isMonthly ? '#fbbf2422' : 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 7px', fontSize: 11, cursor: 'pointer' }}>📅</button>
                      <button onClick={() => deleteGoal(g.id)} style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: 16 }}>✕</button>
                    </div>
                  </div>
                ))
              }
            </div>
          )}
        </div>
      );
    }

    function WhoopTab({ user }) {
      const wKey = `gt_whoop_${user.uid}_${today()}`;
      const saved = JSON.parse(localStorage.getItem(wKey) || 'null');
      const [whoopData, setWhoopData] = useState(saved || { recovery: '', sleep: '', hrv: '', strain: '' });
      const [whoopSaved, setWhoopSaved] = useState(!!saved);
      const [clientId, setClientId] = useState(localStorage.getItem('gt_whoop_client_id') || '');
      const [showClientSetup, setShowClientSetup] = useState(false);
      const [oauthStatus, setOauthStatus] = useState(localStorage.getItem('gt_whoop_token') ? 'connected' : 'none');
      const [oauthData, setOauthData] = useState(JSON.parse(localStorage.getItem('gt_whoop_latest') || 'null'));

      const recoveryColor = (v) => !v ? 'whoop-red' : v >= 67 ? 'whoop-green' : v >= 34 ? 'whoop-yellow' : 'whoop-red';
      const sleepColor = (v) => !v ? 'whoop-red' : v >= 85 ? 'whoop-green' : v >= 60 ? 'whoop-yellow' : 'whoop-red';
      const strainLabel = (v) => !v ? '–' : v >= 18 ? 'All Out' : v >= 14 ? 'Strenuous' : v >= 10 ? 'Moderate' : 'Light';

      const b64url = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      const startOAuth = async () => {
        if (!clientId) { setShowClientSetup(true); return; }
        localStorage.setItem('gt_whoop_client_id', clientId);
        const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
        const challenge = b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
        localStorage.setItem('gt_whoop_verifier', verifier);
        localStorage.setItem('gt_whoop_redirect', window.location.href.split('?')[0]);
        const params = new URLSearchParams({
          client_id: clientId,
          redirect_uri: window.location.href.split('?')[0],
          response_type: 'code',
          scope: 'read:recovery read:sleep read:workout read:body_measurement offline',
          code_challenge: challenge,
          code_challenge_method: 'S256',
          state: 'whoop_auth'
        });
        window.location.href = `https://api.prod.whoop.com/oauth/oauth2/auth?${params}`;
      };

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('state') !== 'whoop_auth' || !params.get('code')) return;
        const code = params.get('code');
        const verifier = localStorage.getItem('gt_whoop_verifier');
        const cid = localStorage.getItem('gt_whoop_client_id');
        if (!code || !verifier || !cid) return;
        window.history.replaceState({}, '', window.location.pathname);
        setOauthStatus('exchanging');
        fetch('https://api.prod.whoop.com/oauth/oauth2/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ grant_type:'authorization_code', code, redirect_uri: localStorage.getItem('gt_whoop_redirect'), client_id: cid, code_verifier: verifier })
        }).then(r => r.json()).then(d => {
          if (d.access_token) {
            localStorage.setItem('gt_whoop_token', d.access_token);
            setOauthStatus('connected');
            fetchWhoopData(d.access_token);
          } else {
            setOauthStatus('error');
          }
        }).catch(() => setOauthStatus('cors_error'));
      }, []);

      const fetchWhoopData = async (token) => {
        try {
          const [rec, sleep] = await Promise.all([
            fetch('https://api.prod.whoop.com/developer/v1/recovery?limit=1', { headers: { Authorization: `Bearer ${token}` } }).then(r=>r.json()),
            fetch('https://api.prod.whoop.com/developer/v1/sleep?limit=1', { headers: { Authorization: `Bearer ${token}` } }).then(r=>r.json())
          ]);
          const latest = {
            recovery: rec.records?.[0]?.score?.recovery_score ?? null,
            hrv: rec.records?.[0]?.score?.hrv_rmssd_milli ? Math.round(rec.records[0].score.hrv_rmssd_milli) : null,
            sleep: sleep.records?.[0]?.score?.sleep_performance_percentage ?? null,
            strain: null
          };
          localStorage.setItem('gt_whoop_latest', JSON.stringify(latest));
          setOauthData(latest);
        } catch {}
      };

      const saveManual = () => {
        localStorage.setItem(wKey, JSON.stringify(whoopData));
        setWhoopSaved(true);
      };

      return (
        <div className="container">
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
            <div style={{ fontSize: 28 }}>⌚</div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 16 }}>Whoop integratie</div>
              <div style={{ fontSize: 12, color: 'var(--muted)' }}>Recovery, slaap & HRV data</div>
            </div>
            <div style={{ marginLeft: 'auto', fontSize: 11, color: oauthStatus === 'connected' ? 'var(--green)' : 'var(--muted)', border: '1px solid', borderRadius: 20, padding: '2px 8px', borderColor: oauthStatus === 'connected' ? 'var(--green)' : 'var(--border)' }}>
              {oauthStatus === 'connected' ? '● Verbonden' : oauthStatus === 'exchanging' ? '⏳ Verbinden...' : '○ Niet verbonden'}
            </div>
          </div>

          {oauthStatus === 'connected' && oauthData && (
            <div className="whoop-grid">
              <div className="whoop-metric">
                <div className="whoop-metric-val" style={{ color: oauthData.recovery >= 67 ? 'var(--green)' : oauthData.recovery >= 34 ? 'var(--yellow)' : 'var(--red)' }}>
                  {oauthData.recovery ?? '–'}%
                </div>
                <div className="whoop-metric-label">Recovery</div>
              </div>
              <div className="whoop-metric">
                <div className="whoop-metric-val" style={{ color: oauthData.sleep >= 85 ? 'var(--green)' : oauthData.sleep >= 60 ? 'var(--yellow)' : 'var(--red)' }}>
                  {oauthData.sleep ?? '–'}%
                </div>
                <div className="whoop-metric-label">Slaap</div>
              </div>
              <div className="whoop-metric">
                <div className="whoop-metric-val" style={{ color: 'var(--blue)' }}>{oauthData.hrv ?? '–'}</div>
                <div className="whoop-metric-label">HRV (ms)</div>
              </div>
              <div className="whoop-metric">
                <div className="whoop-metric-val" style={{ color: 'var(--accent2)' }}>{oauthData.strain ?? '–'}</div>
                <div className="whoop-metric-label">Strain</div>
              </div>
            </div>
          )}

          {oauthStatus === 'cors_error' && (
            <div style={{ background: '#f8717120', border: '1px solid var(--red)', borderRadius: 10, padding: 14, marginBottom: 14, fontSize: 13 }}>
              <div style={{ fontWeight: 600, marginBottom: 4 }}>⚠️ CORS fout</div>
              Whoop blokkeert directe browser-verbindingen. Gebruik handmatige invoer hieronder, of deploy een kleine backend proxy.
            </div>
          )}

          {oauthStatus !== 'connected' && oauthStatus !== 'exchanging' && (
            <div className="whoop-connect-box" style={{ marginBottom: 16 }}>
              <div className="whoop-logo">⌚</div>
              <div style={{ fontWeight: 600, marginBottom: 6 }}>Verbind je Whoop</div>
              <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 14 }}>
                Vereist een gratis Whoop Developer account op developer.whoop.com
              </div>
              {showClientSetup ? (
                <>
                  <div style={{ fontSize: 12, color: 'var(--muted)', textAlign: 'left', marginBottom: 8 }}>
                    1. Ga naar developer.whoop.com<br/>
                    2. Maak een app aan<br/>
                    3. Voeg als Redirect URI toe: <code style={{ fontSize: 11, color: 'var(--accent2)' }}>{window.location.href.split('?')[0]}</code><br/>
                    4. Kopieer je Client ID hieronder
                  </div>
                  <input value={clientId} onChange={e => setClientId(e.target.value)} placeholder="Whoop Client ID" style={{ marginBottom: 8 }} />
                  <button className="btn btn-primary" style={{ width: '100%' }} onClick={startOAuth}>Verbinden via OAuth →</button>
                </>
              ) : (
                <button className="btn btn-primary" style={{ width: '100%', background: '#000', border: '1px solid #fff2' }} onClick={() => setShowClientSetup(true)}>
                  ⌚ Verbind Whoop
                </button>
              )}
            </div>
          )}

          <div className="section-header">Handmatige invoer — vandaag</div>
          <div className="card">
            <div className="whoop-grid">
              <div className="field">
                <label>Recovery %</label>
                <input type="number" min="0" max="100" value={whoopData.recovery} placeholder="67"
                  onChange={e => setWhoopData({ ...whoopData, recovery: e.target.value })} />
              </div>
              <div className="field">
                <label>Slaap %</label>
                <input type="number" min="0" max="100" value={whoopData.sleep} placeholder="80"
                  onChange={e => setWhoopData({ ...whoopData, sleep: e.target.value })} />
              </div>
              <div className="field">
                <label>HRV (ms)</label>
                <input type="number" min="0" value={whoopData.hrv} placeholder="45"
                  onChange={e => setWhoopData({ ...whoopData, hrv: e.target.value })} />
              </div>
              <div className="field">
                <label>Strain (0–21)</label>
                <input type="number" min="0" max="21" step="0.1" value={whoopData.strain} placeholder="12.5"
                  onChange={e => setWhoopData({ ...whoopData, strain: e.target.value })} />
              </div>
            </div>
            <button className="btn btn-primary" style={{ width: '100%', marginTop: 12 }} onClick={saveManual}>
              {whoopSaved ? '✓ Opgeslagen' : 'Opslaan'}
            </button>
          </div>

          {whoopSaved && !oauthData && (
            <div className="whoop-grid" style={{ marginTop: 4 }}>
              {[
                { label: 'Recovery', val: `${whoopData.recovery}%`, color: recoveryColor(+whoopData.recovery) },
                { label: 'Slaap', val: `${whoopData.sleep}%`, color: sleepColor(+whoopData.sleep) },
                { label: 'HRV', val: `${whoopData.hrv}ms`, color: 'whoop-green' },
                { label: 'Strain', val: `${whoopData.strain} (${strainLabel(+whoopData.strain)})`, color: 'whoop-yellow' },
              ].filter(m => m.val !== '%' && m.val !== 'ms' && m.val !== ' ()').map(m => (
                <div key={m.label} className={`whoop-metric ${m.color}`} style={{ border: 'none' }}>
                  <div className="whoop-metric-val">{m.val}</div>
                  <div className="whoop-metric-label">{m.label}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Profiel Screen
    function ProfielScreen({ user }) {
      const [profile, setProfile] = useState(null);
      const [profielTab, setProfielTab] = useState('foto');
      const [supplements, setSupplements] = useState([]);
      const [goals, setGoals] = useState([]);
      const [weightLogs, setWeightLogs] = useState([]);
      const photoInputRef = useRef(null);
      const weightInputRef = useRef(null);

      useEffect(() => {
        const p = JSON.parse(localStorage.getItem(`gt_profile_${user.uid}`) || '{}');
        setProfile(p);
        setSupplements(p.supplements || []);
        setGoals(p.goals || []);
        setWeightLogs(JSON.parse(localStorage.getItem(`gt_weight_${user.uid}`) || '[]'));
      }, [user.uid]);

      const handlePhotoUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 200;
            const ctx = canvas.getContext('2d');
            const sq = Math.min(img.width, img.height);
            const ox = (img.width - sq) / 2;
            const oy = (img.height - sq) / 2;
            ctx.drawImage(img, ox, oy, sq, sq, 0, 0, 200, 200);
            const b64 = canvas.toDataURL('image/jpeg', 0.7);

            const updatedProfile = { ...profile, photoBase64: b64 };
            setProfile(updatedProfile);
            localStorage.setItem(`gt_profile_${user.uid}`, JSON.stringify(updatedProfile));
          };
          img.src = ev.target?.result;
        };
        reader.readAsDataURL(file);
      };

      const BADGES = [
        { id: 'streak3', emoji: '🌱', label: '3 dagen streak', desc: '3 dagen op rij gedaan', check: stats => stats.currentStreak >= 3 },
        { id: 'streak7', emoji: '🔥', label: 'Week warrior', desc: '7 dagen op rij gedaan', check: stats => stats.currentStreak >= 7 },
        { id: 'streak30', emoji: '⚡', label: 'Maand meester', desc: '30 dagen op rij gedaan', check: stats => stats.currentStreak >= 30 },
        { id: 'perfectDay', emoji: '⭐', label: 'Perfecte dag', desc: 'Alle doelen op 1 dag gehaald', check: stats => stats.perfectDays >= 1 },
        { id: 'fitnessFan', emoji: '💪', label: 'Fitness fan', desc: '10 workouts gelogd', check: stats => stats.totalWorkouts >= 10 },
        { id: 'foodLogger', emoji: '🥗', label: 'Voedingsgoeroe', desc: '30 maaltijden gelogd', check: stats => stats.totalFoodLogs >= 30 },
        { id: 'waterChamp', emoji: '💧', label: 'Water kampioen', desc: '14 dagen waterdoel gehaald', check: stats => stats.waterGoalDays >= 14 },
        { id: 'earlyAdopter', emoji: '🚀', label: 'Early adopter', desc: 'Eerste om GrowthTrack te gebruiken', check: stats => true }
      ];

      const stats = calcStats(user.uid, goals);
      const earned = BADGES.filter(b => b.check(stats));

      const renderFoto = () => (
        <div className="container">
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16, marginBottom: 24 }}>
            <div className="avatar avatar-lg">
              {profile?.photoBase64 ? (
                <img src={profile.photoBase64} alt="Profile" />
              ) : (
                profile?.name?.[0] || 'U'
              )}
            </div>
            <button className="btn btn-secondary" onClick={() => photoInputRef.current?.click()}>
              📷 Wijzig foto
            </button>
            <input
              ref={photoInputRef}
              type="file"
              accept="image/*"
              onChange={handlePhotoUpload}
              style={{ display: 'none' }}
            />
          </div>
        </div>
      );
      const renderAccount = () => (
        <div className="container">
          <div className="card">
            <div className="row">
              <div>Naam</div>
              <div className="text-bold">{profile?.name}</div>
            </div>
            <div className="row">
              <div>Email</div>
              <div className="text-bold">{profile?.email}</div>
            </div>
          </div>
          <button className="btn mt-2" style={{ background: 'var(--red)' }} onClick={() => {
            localStorage.clear();
            window.location.reload();
          }}>
            Uitloggen
          </button>
        </div>
      );

      if (!profile) return null;

      return (
        <div className="screen">
          <div className="subtabs">
            {['foto', 'badges', 'gewicht', 'supplementen', 'doelen', 'whoop', 'account'].map(tab => (
              <button
                key={tab}
                className={`subtab ${profielTab === tab ? 'active' : ''}`}
                onClick={() => setProfielTab(tab)}
              >
                {tab.charAt(0).toUpperCase() + tab.slice(1)}
              </button>
            ))}
          </div>

          {profielTab === 'foto' && renderFoto()}
          {profielTab === 'badges' && <BadgesTab user={user} profile={profile} setProfile={setProfile} stats={stats} earned={earned} BADGES={BADGES} />}
          {profielTab === 'gewicht' && <GewichtTab user={user} profile={profile} setProfile={setProfile} weightLogs={weightLogs} setWeightLogs={setWeightLogs} />}
          {profielTab === 'supplementen' && <SupplementenTab user={user} profile={profile} setProfile={setProfile} supplements={supplements} setSupplements={setSupplements} />}
          {profielTab === 'doelen' && <DoelenTab user={user} profile={profile} setProfile={setProfile} goals={goals} setGoals={setGoals} />}
          {profielTab === 'whoop' && <WhoopTab user={user} />}
          {profielTab === 'account' && renderAccount()}
        </div>
      );
    }

    // Main App
    function App() {
      const [user, setUser] = useState(null);
      const [tab, setTab] = useState(0);
      const [toast, setToast] = useState({ visible: false, message: '' });
      const [showStats, setShowStats] = useState(false);

      useEffect(() => {
        if (!DEMO_MODE && auth) {
          auth.onAuthStateChanged(u => {
            if (u) {
              setUser({ uid: u.uid, email: u.email });
            }
          });
        }
      }, []);

      const showToast = useCallback((msg) => {
        setToast({ visible: true, message: msg });
        setTimeout(() => setToast({ visible: false, message: '' }), 4500);
      }, []);

      // Check friend achievements & fire notifications on login
      useEffect(() => {
        if (!user) return;

        // Request browser notification permission
        if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
          Notification.requestPermission();
        }

        // Check yesterday's friend completion
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yDate = yesterday.toISOString().slice(0, 10);
        const checked = localStorage.getItem(`gt_notif_checked_${yDate}`);
        if (checked) return;

        const allProfiles = Object.keys(localStorage)
          .filter(k => k.startsWith('gt_profile_') && !k.includes(user.uid))
          .map(k => JSON.parse(localStorage.getItem(k) || '{}'))
          .filter(p => p.uid);

        let delay = 500;
        allProfiles.forEach(friend => {
          const checkin = JSON.parse(localStorage.getItem(`gt_checkins_${friend.uid}_${yDate}`) || '{}');
          if (checkin.completionPct === 100) {
            setTimeout(() => {
              const msg = `🎉 ${friend.name} haalde gisteren alle doelen!`;
              showToast(msg);
              if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
                new Notification('GrowthTrack', { body: msg, icon: 'icon.svg' });
              }
            }, delay);
            delay += 5000;
          }
        });

        localStorage.setItem(`gt_notif_checked_${yDate}`, '1');
      }, [user?.uid]);

      const handleAuth = (userData) => {
        setUser(userData);
        setTab(0);
      };

      if (!user) {
        return <AuthScreen onAuth={handleAuth} />;
      }

      const profile = JSON.parse(localStorage.getItem(`gt_profile_${user.uid}`) || '{}');
      const goals = profile.goals || [];

      const screens = [
        <VandaagScreen key="vandaag" user={user} onShowStats={() => setShowStats(true)} />,
        <TrainingScreen key="training" user={user} />,
        <VoedingScreen key="voeding" user={user} />,
        <GroepScreen key="groep" user={user} />,
        <ProfielScreen key="profiel" user={user} />
      ];

      return (
        <>
          {screens[tab]}
          <div className="navbar">
            {['🏠', '💪', '🍽️', '👥', '👤'].map((icon, i) => (
              <div
                key={i}
                className={`nav-item ${tab === i ? 'active' : ''}`}
                onClick={() => setTab(i)}
                style={{ position: 'relative' }}
              >
                {icon}
                <div className="nav-label">{['Vandaag', 'Training', 'Voeding', 'Groep', 'Profiel'][i]}</div>
                {i === 3 && toast.visible && tab !== 3 && <div className="nav-badge" />}
              </div>
            ))}
          </div>
          <ToastNotification message={toast.message} visible={toast.visible} />
          {showStats && (
            <StatsModal user={user} goals={goals} onClose={() => setShowStats(false)} />
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      const swCode = `
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => self.clients.claim());
        self.addEventListener('fetch', e => e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request)).catch(() =>
            new Response('Offline', {status: 503})
          )
        ));
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
</body>
</html>
